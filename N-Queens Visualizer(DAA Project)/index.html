<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>N-Queens Visualizer</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <h1>N-Queens Backtracking</h1>
    
    <div class="controls">
        <label for="size">Board Size (N):</label>
        <input type="number" id="size" value="8" min="4" max="12">
        <button id="solveBtn" onclick="startVisualization()">Visualize Algorithm</button>
    </div>

    <div id="status">Ready to solve...</div>
    <div id="board"></div>

    <script src="script.js"></script>

</body>
</html>
